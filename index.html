<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Т-Авто · Помоги нам сделать продукт</title>
<meta name="description" content="Короткое исследование для автомобилистов. Думаем над Т-Авто — нужно твоё мнение." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --yellow:#FFDD2D;
    --yellow-hover:#FFD000;
    --black:#1B1F26;
    --black-soft:#2A2F37;
    --bg:#F4F4F5;
    --surface:#FFFFFF;
    --text:#1B1F26;
    --text-mute:#6E7686;
    --border:#E8E8EB;
    --shadow-lg:0 24px 60px rgba(27,31,38,.12);
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:var(--font);color:var(--text);background:var(--black);min-height:100vh;-webkit-font-smoothing:antialiased;font-feature-settings:'cv11','ss01';letter-spacing:-0.005em}
  body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 700px 500px at 80% 20%,rgba(255,221,45,.18) 0%,transparent 60%),radial-gradient(ellipse 500px 400px at 0% 90%,rgba(255,221,45,.08) 0%,transparent 60%);pointer-events:none;z-index:0}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  .wrap{position:relative;z-index:1;max-width:1040px;margin:0 auto;padding:30px 22px 60px;min-height:100vh;display:flex;flex-direction:column;color:#fff}

  /* ===== Header ===== */
  header.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:64px;flex-wrap:wrap;gap:14px}
  .brand{display:flex;align-items:center;gap:12px}
  .brand-mark{width:42px;height:42px;border-radius:12px;background:var(--yellow);color:var(--black);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;letter-spacing:-0.02em}
  .brand-info{line-height:1.15}
  .brand-name{font-size:18px;font-weight:800;letter-spacing:-0.01em}
  .brand-sub{font-size:12.5px;color:rgba(255,255,255,.55);font-weight:500;margin-top:2px}
  .switch{display:inline-flex;background:rgba(255,255,255,.08);border-radius:999px;padding:3px}
  .switch button{padding:6px 14px;border-radius:999px;color:rgba(255,255,255,.6);font-weight:600;font-size:13px;transition:all .15s}
  .switch button.on{background:var(--yellow);color:var(--black)}
  .switch button:hover:not(.on){color:#fff}

  /* ===== Hero ===== */
  .hero{margin-bottom:54px;max-width:780px}
  .eyebrow{display:inline-block;padding:6px 14px;background:var(--yellow);color:var(--black);border-radius:999px;font-size:12px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:22px}
  h1{font-size:60px;letter-spacing:-0.035em;line-height:1;margin:0 0 22px;font-weight:800}
  h1 .accent{color:var(--yellow)}
  .lead{font-size:19px;line-height:1.55;color:rgba(255,255,255,.78);margin:0;max-width:640px}
  @media (max-width:680px){h1{font-size:42px}.lead{font-size:17px}}
  @media (max-width:480px){h1{font-size:36px}}

  /* ===== Cards ===== */
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:50px}
  @media (max-width:780px){.cards{grid-template-columns:1fr}}

  .card{position:relative;background:var(--surface);border-radius:24px;padding:36px 32px 32px;color:var(--text);text-decoration:none;display:flex;flex-direction:column;gap:14px;cursor:pointer;overflow:hidden;transition:all .25s ease;box-shadow:0 4px 24px rgba(0,0,0,.15)}
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}

  .card.qual{background:var(--surface)}
  .card.quant{background:var(--yellow)}

  .card .icon-wrap{width:60px;height:60px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;font-weight:800}
  .card.qual .icon-wrap{background:var(--black);color:var(--yellow)}
  .card.quant .icon-wrap{background:var(--black);color:var(--yellow)}
  .card .meta{display:flex;gap:6px;font-size:11.5px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-mute);margin-top:4px}
  .card.quant .meta{color:rgba(27,31,38,.65)}
  .card .meta span{padding:3px 10px;background:rgba(27,31,38,.06);border-radius:999px}
  .card.quant .meta span{background:rgba(27,31,38,.12)}
  .card h3{margin:0;font-size:24px;font-weight:800;line-height:1.2;letter-spacing:-0.02em}
  .card p{margin:0;color:var(--text-mute);font-size:15px;line-height:1.55}
  .card.quant p{color:rgba(27,31,38,.75)}
  .card ul{margin:8px 0 0;padding:0;list-style:none;font-size:14px;color:var(--text-mute);line-height:1.7}
  .card.quant ul{color:rgba(27,31,38,.75)}
  .card ul li{padding-left:20px;position:relative}
  .card ul li::before{content:"→";position:absolute;left:0;font-weight:800;color:var(--text)}
  .card.quant ul li::before{color:var(--black)}
  .card .cta{margin-top:auto;display:inline-flex;align-items:center;gap:8px;padding:13px 22px;border-radius:12px;font-size:15px;font-weight:700;align-self:flex-start;transition:all .2s}
  .card.qual .cta{background:var(--yellow);color:var(--black)}
  .card.qual:hover .cta{background:var(--yellow-hover)}
  .card.quant .cta{background:var(--black);color:#fff}
  .card.quant:hover .cta{background:var(--black-soft)}
  .card .cta::after{content:"→";font-weight:800;transition:transform .2s}
  .card:hover .cta::after{transform:translateX(4px)}

  /* ===== Footer ===== */
  .footer-info{margin-top:auto;padding-top:30px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;color:rgba(255,255,255,.55);font-size:13px}
  .footer-info a{color:rgba(255,255,255,.7);font-weight:500;border-bottom:1px solid rgba(255,255,255,.2);padding-bottom:1px}
  .footer-info a:hover{color:var(--yellow);border-color:var(--yellow)}
  .footer-links{display:flex;gap:18px;flex-wrap:wrap}
  @media (max-width:560px){.footer-info{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>

<div class="wrap">

<header class="top">
  <div class="brand">
    <div class="brand-mark">Т</div>
    <div class="brand-info">
      <div class="brand-name">Т-Авто</div>
      <div class="brand-sub" data-i18n="brand.sub"></div>
    </div>
  </div>
  <div class="switch" id="lang-switch">
    <button data-lang="ru" class="on">RU</button>
    <button data-lang="en">EN</button>
  </div>
</header>

<section class="hero">
  <span class="eyebrow" data-i18n="hero.eyebrow"></span>
  <h1 data-i18n="hero.title"></h1>
  <p class="lead" data-i18n="hero.lead"></p>
</section>

<section class="cards">

  <a class="card qual" href="qualitative.html">
    <div class="icon-wrap">💬</div>
    <div class="meta">
      <span data-i18n="qual.meta1"></span>
      <span data-i18n="qual.meta2"></span>
    </div>
    <h3 data-i18n="qual.title"></h3>
    <p data-i18n="qual.desc"></p>
    <ul data-i18n-ul="qual.bullets"></ul>
    <span class="cta" data-i18n="qual.cta"></span>
  </a>

  <a class="card quant" href="custdev_form.html">
    <div class="icon-wrap">📊</div>
    <div class="meta">
      <span data-i18n="quant.meta1"></span>
      <span data-i18n="quant.meta2"></span>
    </div>
    <h3 data-i18n="quant.title"></h3>
    <p data-i18n="quant.desc"></p>
    <ul data-i18n-ul="quant.bullets"></ul>
    <span class="cta" data-i18n="quant.cta"></span>
  </a>

</section>

<div class="footer-info">
  <span data-i18n="footer.privacy"></span>
  <div class="footer-links">
    <a href="setup_guide.html" data-i18n="footer.setup"></a>
    <a href="deployment_guide.html" data-i18n="footer.deploy"></a>
  </div>
</div>

</div>

<script>
const I18N = {
  ru: {
    "brand.sub":"CustDev",
    "hero.eyebrow":"Помоги нам сделать продукт",
    "hero.title":"Думаем над Т-Авто — <span class=\"accent\">нужно твоё мнение</span>",
    "hero.lead":"Выбери формат, который тебе ближе. Любой — большая помощь нам, и можно ругать.",

    "qual.meta1":"💬 Текстовое интервью",
    "qual.meta2":"~10–15 минут",
    "qual.title":"Расскажи своими словами",
    "qual.desc":"Несколько открытых вопросов про твою машину и две идеи, которые мы сейчас крутим.",
    "qual.bullets":["Открытые вопросы","Можно коротко, можно длинно","Самое полезное — твои истории и формулировки"],
    "qual.cta":"Начать интервью",

    "quant.meta1":"📊 Опрос",
    "quant.meta2":"~20–25 минут",
    "quant.title":"Структурированный опрос",
    "quant.desc":"Чек-листы, шкалы, цены. Хорошо для большой выборки и количественной оценки.",
    "quant.bullets":["Готовые варианты ответов","Готовность платить по 8 услугам","Автосохранение, можно вернуться позже"],
    "quant.cta":"Пройти опрос",

    "footer.privacy":"Ответы используются только для исследования продукта. Спасибо!",
    "footer.setup":"Настройка backend",
    "footer.deploy":"Деплой / хостинг"
  },
  en: {
    "brand.sub":"CustDev",
    "hero.eyebrow":"Help us build T-Auto",
    "hero.title":"We are building T-Auto — <span class=\"accent\">your take really helps</span>",
    "hero.lead":"Pick the format that suits you. Either is a huge help. Be honest, be blunt.",

    "qual.meta1":"💬 Text interview",
    "qual.meta2":"~10–15 minutes",
    "qual.title":"Tell us in your own words",
    "qual.desc":"A few open questions about your car and two ideas we're considering.",
    "qual.bullets":["Open-ended questions","Short or long, your call","The gold is in your stories"],
    "qual.cta":"Start interview",

    "quant.meta1":"📊 Survey",
    "quant.meta2":"~20–25 minutes",
    "quant.title":"Structured survey",
    "quant.desc":"Checklists, scales, prices. Good for a broad sample and quantitative read.",
    "quant.bullets":["Pre-written answer options","WTP for 8 services","Auto-saved, return any time"],
    "quant.cta":"Take the survey",

    "footer.privacy":"Answers are used for product research only. Thank you!",
    "footer.setup":"Backend setup",
    "footer.deploy":"Deploy / hosting"
  }
};

let lang = (localStorage.getItem("tcar_lang") || ((navigator.language||"ru").startsWith("ru") ? "ru" : "en"));
function apply(){
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k = el.dataset.i18n; const v = I18N[lang][k];
    if(typeof v==="string") el.innerHTML = v;
  });
  document.querySelectorAll("[data-i18n-ul]").forEach(el=>{
    const k = el.dataset.i18nUl; const arr = I18N[lang][k];
    if(Array.isArray(arr)) el.innerHTML = arr.map(s=>"<li>"+s+"</li>").join("");
  });
  document.querySelectorAll("#lang-switch button").forEach(b=>b.classList.toggle("on", b.dataset.lang===lang));
}
document.querySelectorAll("#lang-switch button").forEach(b=>b.addEventListener("click",()=>{
  lang = b.dataset.lang; localStorage.setItem("tcar_lang",lang); apply();
}));
apply();
</script>
</body>
</html>
